<!DOCTYPE html>

<html class="dark" lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>COLISEU CLUBE | LOGIN</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@700;800;900&amp;family=Inter:wght@400;600;700;800&amp;family=Space+Grotesk:wght@700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "tertiary-fixed": "#cde5ff",
              "on-tertiary-fixed": "#001d32",
              "surface-container-low": "#1c1b1b",
              "secondary-fixed": "#e5e2e1",
              "inverse-primary": "#c00015",
              "surface-variant": "#353534",
              "on-secondary-fixed": "#1c1b1b",
              "tertiary-container": "#0079b9",
              "error": "#ffb4ab",
              "surface": "#131313",
              "background": "#131313",
              "surface-container-high": "#2a2a2a",
              "error-container": "#93000a",
              "primary-fixed": "#ffdad6",
              "on-error-container": "#ffdad6",
              "surface-container-highest": "#353534",
              "surface-container": "#201f1f",
              "outline": "#ae8883",
              "inverse-surface": "#e5e2e1",
              "on-background": "#e5e2e1",
              "surface-dim": "#131313",
              "on-primary-fixed": "#410002",
              "on-secondary-fixed-variant": "#474746",
              "secondary": "#c8c6c5",
              "on-secondary": "#313030",
              "secondary-fixed-dim": "#c8c6c5",
              "on-tertiary-container": "#f9faff",
              "primary-fixed-dim": "#ffb4ac",
              "primary-container": "#e31b23",
              "on-primary-fixed-variant": "#93000d",
              "on-secondary-container": "#b7b5b4",
              "tertiary": "#94ccff",
              "surface-bright": "#3a3939",
              "tertiary-fixed-dim": "#94ccff",
              "outline-variant": "#5d3f3c",
              "on-tertiary-fixed-variant": "#004b74",
              "primary": "#ffb4ac",
              "on-error": "#690005",
              "on-primary-container": "#fff9f8",
              "on-surface": "#e5e2e1",
              "surface-tint": "#ffb4ac",
              "secondary-container": "#474746",
              "inverse-on-surface": "#313030",
              "surface-container-lowest": "#0e0e0e",
              "on-surface-variant": "#e7bdb8",
              "on-primary": "#690006",
              "on-tertiary": "#003352"
            },
            fontFamily: {
              "headline": ["Space Grotesk"],
              "body": ["Inter"],
              "label": ["Inter"],
              "display": ["Outfit"]
            },
            borderRadius: {"DEFAULT": "0px", "lg": "0px", "xl": "0px", "full": "9999px"},
          },
        },
      }
    </script>
<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .grain-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 50;
        opacity: 0.03;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      }
      .glow-border {
        box-shadow: 0 -4px 20px rgba(227, 27, 35, 0.25);
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body selection:bg-primary-container selection:text-on-primary-container min-h-screen flex flex-col items-center justify-center p-6 relative overflow-hidden">
<div class="grain-overlay"></div>
<!-- Background Industrial Elements -->
<div class="absolute inset-0 z-0 opacity-10">
<div class="absolute top-0 left-0 w-full h-full border-[40px] border-surface-container-high pointer-events-none"></div>
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full h-px bg-outline-variant/20"></div>
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 h-full w-px bg-outline-variant/20"></div>
</div>
<!-- Main Login Container -->
<main class="relative z-10 w-full max-w-md">
<!-- Brand Identity -->
<header class="text-center mb-12">
<h1 class="font-display font-black text-6xl tracking-widest text-primary-container leading-none uppercase">
                COLISEU<br/>CLUBE
            </h1>
<p class="mt-4 font-label uppercase tracking-[0.3em] text-outline text-xs">A Forja da Elite</p>
</header>
<!-- Login Card -->
<div class="bg-surface-container-lowest border-t-4 border-primary-container glow-border p-8 md:p-12 shadow-2xl relative">
<div class="absolute top-0 right-0 p-2 opacity-10">
<span class="material-symbols-outlined text-4xl" data-icon="security">security</span>
</div>
<form class="space-y-8">
<!-- Identifier Field -->
<div class="space-y-2">
<label class="block font-label text-[10px] tracking-widest uppercase text-on-surface-variant font-bold">Acesso do Atleta</label>
<div class="relative group">
<span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline group-focus-within:text-primary-container transition-colors" data-icon="person">person</span>
<input class="w-full bg-surface-container-low border-0 border-b-2 border-surface-variant focus:ring-0 focus:border-primary-container pl-12 pr-4 py-4 text-sm font-label tracking-widest uppercase transition-all duration-300 placeholder:text-outline-variant" placeholder="CPF OU E-MAIL" type="text"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="block font-label text-[10px] tracking-widest uppercase text-on-surface-variant font-bold">Senha de Entrada</label>
<a class="font-label text-[10px] tracking-widest uppercase text-outline hover:text-primary-container transition-colors" href="#">Esqueci a Senha</a>
</div>
<div class="relative group">
<span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline group-focus-within:text-primary-container transition-colors" data-icon="lock">lock</span>
<input class="w-full bg-surface-container-low border-0 border-b-2 border-surface-variant focus:ring-0 focus:border-primary-container pl-12 pr-4 py-4 text-sm font-label tracking-widest transition-all duration-300 placeholder:text-outline-variant" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline hover:text-on-surface" data-icon="visibility" type="button">visibility</button>
</div>
</div>
<!-- Primary Action -->
<button class="w-full bg-primary-container text-on-primary-container py-5 font-display font-black text-xl tracking-widest uppercase hover:brightness-110 active:scale-[0.98] transition-all shadow-[0_4px_15px_rgba(227,27,35,0.3)] flex items-center justify-center gap-4" type="submit">
                    ENTRAR NO CLUBE
                    <span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Bottom Context -->
<div class="mt-10 pt-8 border-t border-surface-variant/30 text-center">
<p class="font-label text-[10px] tracking-widest uppercase text-outline">
                    Ainda não é um membro do Coliseum? 
                    <a class="text-primary-container font-bold hover:underline ml-1" href="#">Aliste-se Agora</a>
</p>
</div>
</div>
<!-- System Status Bar (Industrial Detail) -->
<div class="mt-8 flex justify-between items-center px-2">
<div class="flex items-center gap-4">
<div class="flex items-center gap-1.5">
<span class="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></span>
<span class="font-label text-[9px] tracking-widest text-outline uppercase">Servidor Arena Online</span>
</div>
<div class="h-3 w-px bg-outline-variant/30"></div>
<span class="font-label text-[9px] tracking-widest text-outline uppercase">v2.4.0-TACTICAL</span>
</div>
<div class="flex gap-4">
<span class="material-symbols-outlined text-outline text-lg hover:text-primary-container cursor-pointer" data-icon="language">language</span>
<span class="material-symbols-outlined text-outline text-lg hover:text-primary-container cursor-pointer" data-icon="help_outline">help_outline</span>
</div>
</div>
</main>
<!-- Decorative Texture Bottom -->
<div class="fixed bottom-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-primary-container/20 to-transparent"></div>
</body></html>
