<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check-in Coliseu</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Outfit:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/checkin/style.css">
    <link rel="icon" type="image/svg+xml" href="/research-page/favicon.svg">
</head>
<body>
    <div class="container">
        <div class="logo-container">
            <img src="/research-page/logo-coliseu.svg" alt="Coliseu Logo" class="brand-logo">
        </div>

        <div class="webcam-container">
            <svg class="camera-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"></path>
                <circle cx="12" cy="13" r="3"></circle>
            </svg>
            <video id="webcam" autoplay playsinline muted></video>
        </div>

        <main class="content">
            <h1 class="main-title">FAÇA SEU<br><span class="highlight">CHECK-IN</span></h1>
        </main>

        <footer class="partners">
            <div class="partners-logos">
                <div class="partner-card">
                    <img src="/checkin/logo-wellhub.svg" alt="Wellhub" class="partner-logo wellhub">
                </div>
                <div class="partner-card">
                    <img src="/checkin/logo-totalpass.svg" alt="TotalPass" class="partner-logo">
                </div>
            </div>
        </footer>
    </div>

    <script src="/checkin/main.js"></script>
    <script>
        async function initWebcam() {
            const video = document.getElementById('webcam');
            const container = document.querySelector('.webcam-container');
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
                video.srcObject = stream;
            } catch (err) {
                console.error("Error accessing webcam: ", err);
                // Keep the circular container empty (black) so the layout stays correct
                container.style.border = '3px dashed rgba(255, 255, 255, 0.2)';
            }
        }
        
        document.addEventListener('DOMContentLoaded', initWebcam);
    </script>
</body>
</html>
